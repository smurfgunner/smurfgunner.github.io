<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=6774653276">
    <title>The Watchlist</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1c1c1e;
            color: #fff;
            text-align: center;
            padding: 24px;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        p { color: #8e8e93; font-size: 17px; margin-bottom: 36px; line-height: 1.5; }
        a {
            display: inline-block;
            background: #0a84ff;
            color: #fff;
            padding: 14px 32px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        a:hover { background: #0070d8; }
    </style>
</head>
<body>
    <div class="icon">🎬</div>
    <h1>The Watchlist</h1>
    <p>Someone shared a movie with you.<br>Get the app to add it to your watchlist.</p>
    <a href="https://apps.apple.com/app/id6774653276">Download on the App Store</a>
</body>
</html>
